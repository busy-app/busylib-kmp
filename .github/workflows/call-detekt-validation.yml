name: "detekt-validation"
on:
  workflow_call:
jobs:
  detekt-jvm:
    name: "Detekt JVM (type resolution)"
    runs-on: [ self-hosted, Linux ]
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Give gradle permission
        run: chmod +x gradlew
      # Checks jvmMain + commonMain with type resolution
      - name: Detekt JVM
        uses: gradle/gradle-build-action@v3
        with:
          arguments: detektMainJvm

  detekt-android:
    name: "Detekt Android"
    runs-on: [ self-hosted, Linux ]
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Give gradle permission
        run: chmod +x gradlew
      # Checks androidMain only (without commonMain to avoid double-checking)
      - name: Detekt Android
        uses: gradle/gradle-build-action@v3
        with:
          arguments: detektAndroidMainSourceSet

  detekt-apple:
    name: "Detekt Apple source sets"
    runs-on: [ self-hosted, Linux ]
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Give gradle permission
        run: chmod +x gradlew
      # No type resolution available for native targets, source-set tasks only
      - name: Detekt Apple
        uses: gradle/gradle-build-action@v3
        with:
          arguments: >-
            detektNativeMainSourceSet
            detektAppleMainSourceSet
            detektIosMainSourceSet
            detektMacosMainSourceSet
