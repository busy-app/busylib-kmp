name: "gradle-wrapper-validation"
on:
  workflow_call:

jobs:
  validation:
    name: "Gradle Wrapper Validation"
    runs-on: [ self-hosted, Linux, Android ]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3