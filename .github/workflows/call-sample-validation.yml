name: "Sample build"
on:
  workflow_call:

jobs:
  sample_cmp_build_jvm:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "JVM"
            task: ":sample:cmp:jvmJar"
          - name: "Android"
            task: ":sample:android:assembleDebug"
    name: "Build jvm sample:cmp (${{ matrix.name }})"
    runs-on: [ self-hosted, Linux, Android ]
    env:
      ORG_GRADLE_PROJECT_current_flavor_type: DEBUG
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up JDK 1.17
        uses: ./.github/actions/setup-java
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          # Pin to 16.0 (v3 default) — cmdline-tools 20.0 crashes on self-hosted macOS runners
          cmdline-tools-version: '12266719'
      - name: Give gradle permission
        run: chmod +x gradlew
      - name: Build sample:cmp target
        uses: gradle/gradle-build-action@v3
        with:
          arguments: ${{ matrix.task }} --stacktrace
  sample_cmp_build_apple:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "iOS"
            task: ":sample:cmp:linkDebugFrameworkIosFat"
          - name: "macOS"
            task: ":sample:cmp:linkDebugFrameworkOsxFat"
    name: "Build apple sample:cmp (${{ matrix.name }})"
    runs-on: [ self-hosted, macOS ]
    env:
      ORG_GRADLE_PROJECT_current_flavor_type: DEBUG
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up JDK 1.17
        uses: ./.github/actions/setup-java
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          # Pin to 16.0 (v3 default) — cmdline-tools 20.0 crashes on self-hosted macOS runners
          cmdline-tools-version: '12266719'
      - name: Give gradle permission
        run: chmod +x gradlew
      - name: Build sample:cmp target
        uses: gradle/gradle-build-action@v3
        with:
          arguments: ${{ matrix.task }} --stacktrace
