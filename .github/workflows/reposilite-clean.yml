name: Clean Reposilite

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC
  workflow_dispatch:
    inputs:
      max_age_days:
        description: "Delete artifacts older than N days"
        default: "30"
        type: string

jobs:
  scan:
    name: "Scan: ${{ matrix.repo }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [releases, snapshots]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scan for old artifacts
        env:
          REPOSILITE_TOKEN: ${{ secrets.REPOSILITE_TOKEN }}
        run: |
          python .github/workflows/reposilite-cleaner/scan.py \
            --repo ${{ matrix.repo }} \
            --max-age-days ${{ github.event.inputs.max_age_days || '30' }} \
            --exclude-file .github/workflows/reposilite-cleaner/exclude.txt \
            --output scan_result.csv \
            --cleanup-output cleanup_dirs.csv
      - uses: actions/upload-artifact@v4
        with:
          name: scan-${{ matrix.repo }}
          path: scan_result.csv
      - uses: actions/upload-artifact@v4
        with:
          name: cleanup-${{ matrix.repo }}
          path: cleanup_dirs.csv

  delete:
    name: "Delete: ${{ matrix.repo }}"
    needs: scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [releases, snapshots]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: scan-${{ matrix.repo }}
      - name: Delete old artifacts
        env:
          REPOSILITE_TOKEN: ${{ secrets.REPOSILITE_TOKEN }}
        run: python .github/workflows/reposilite-cleaner/delete.py --repo ${{ matrix.repo }} --input scan_result.csv

  cleanup:
    name: "Cleanup: ${{ matrix.repo }}"
    needs: scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [releases, snapshots]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: cleanup-${{ matrix.repo }}
      - name: Remove empty directories
        env:
          REPOSILITE_TOKEN: ${{ secrets.REPOSILITE_TOKEN }}
        run: python .github/workflows/reposilite-cleaner/cleanup.py --repo ${{ matrix.repo }} --input cleanup_dirs.csv
